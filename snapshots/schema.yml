version: 2

snapshots:
  - name: snap_dim_operators
    description: "SCD Type 2 snapshot of operator dimension. Tracks historical changes to operator names."
    columns:
      - name: operator_id
        description: "Primary key — unique operator identifier"
        tests:
          - not_null
      - name: operator_name
        description: "Operator/fleet name"
        tests:
          - not_null
      - name: dbt_valid_from
        description: "Timestamp when this version became valid (SCD Type 2 managed by dbt)"
      - name: dbt_valid_to
        description: "Timestamp when this version became invalid. NULL = current version (SCD Type 2 managed by dbt)"
      - name: dbt_scd_id
        description: "Unique identifier for each snapshot row (SCD Type 2 managed by dbt)"
        tests:
          - unique
          - not_null
      - name: dbt_updated_at
        description: "Timestamp of snapshot execution (SCD Type 2 managed by dbt)"

  - name: snap_dim_routes
    description: "SCD Type 2 snapshot of route dimension. Tracks historical changes to route names."
    columns:
      - name: route_operator_key
        description: "Surrogate PK — concatenation of operator_id + '_' + route_id"
        tests:
          - not_null
      - name: operator_id
        description: "Foreign key to operator dimension"
        tests:
          - not_null
      - name: route_id
        description: "Route identifier (part of composite key)"
        tests:
          - not_null
      - name: route_name
        description: "Route long name"
        tests:
          - not_null
      - name: dbt_valid_from
        description: "Timestamp when this version became valid (SCD Type 2 managed by dbt)"
      - name: dbt_valid_to
        description: "Timestamp when this version became invalid. NULL = current version (SCD Type 2 managed by dbt)"
      - name: dbt_scd_id
        description: "Unique identifier for each snapshot row (SCD Type 2 managed by dbt)"
        tests:
          - unique
          - not_null
      - name: dbt_updated_at
        description: "Timestamp of snapshot execution (SCD Type 2 managed by dbt)"
